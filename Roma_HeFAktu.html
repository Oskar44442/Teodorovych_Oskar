<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Стилі</title>
<style>
body.dark {
    background-color: black;
    color: white;
}
</style>
</head>
<body>

<input type="color" id="textColor">
<input type="color" id="bgColor">
<br><br>

<input type="range" id="size" min="10" max="50" value="16">
<span id="value">16</span>
<br><br>

<button id="bold">Жирний</button>
<button id="italic">Курсив</button>
<button id="underline">Підкреслення</button>
<br><br>

<button id="toggle">Сховати/Показати</button>
<button id="mode">Light/Dark</button>
<button id="reset">Скинути</button>

<p id="text">Приклад тексту</p>

<script>
let text = document.getElementById("text");

document.getElementById("textColor").oninput = function() {
    text.style.color = this.value;
};

document.getElementById("bgColor").oninput = function() {
    text.style.backgroundColor = this.value;
};

document.getElementById("size").oninput = function() {
    text.style.fontSize = this.value + "px";
    document.getElementById("value").textContent = this.value;
};

document.getElementById("bold").onclick = function() {
    text.style.fontWeight = text.style.fontWeight === "bold" ? "normal" : "bold";
};

document.getElementById("italic").onclick = function() {
    text.style.fontStyle = text.style.fontStyle === "italic" ? "normal" : "italic";
};

document.getElementById("underline").onclick = function() {
    text.style.textDecoration = text.style.textDecoration === "underline" ? "none" : "underline";
};

document.getElementById("toggle").onclick = function() {
    text.style.display = text.style.display === "none" ? "block" : "none";
};

document.getElementById("mode").onclick = function() {
    document.body.classList.toggle("dark");
};

document.getElementById("reset").onclick = function() {
    text.style = "";
    document.body.classList.remove("dark");
};
</script>

</body>
</html>
