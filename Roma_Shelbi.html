<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 1</title>
</head>
<body>

    <h2>Користувачі</h2>
    <button onclick="getUsers()">Завантажити</button>
    <ul id="list"></ul>

    <script>
        function getUsers() {
            fetch('https://jsonplaceholder.typicode.com/users')
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('list');
                    list.innerHTML = '';

                    data.forEach(user => {
                        const li = document.createElement('li');
                        li.textContent = user.name + ' - ' + user.email;
                        list.appendChild(li);
                    });
                })
                .catch(() => {
                    alert('Помилка завантаження');
                });
        }
    </script>

</body>
</html>
