<!DOCTYPE html>
<html></html>
<head>
  <meta charset="UTF-8">
  <title>Варіант 4</title>
</head>
<body>

<script>
function fetchUser(userId) {
  return new Promise((resolve) => {
    setTimeout(() => {
      const user = { id: userId, name: "User_" + userId };
      console.log("Користувач отриманий:", user);
      resolve(user);
    }, 2000);
  });
}

function fetchOrders(userId) {
  return fetchUser(userId).then(user => {
    return new Promise((resolve) => {
      setTimeout(() => {
        const orders = [
          { id: 1, item: "Laptop" },
          { id: 2, item: "Phone" },
          { id: 3, item: "Tablet" }
        ];
        console.log(`Замовлення для ${user.name}:`, orders);
        resolve(orders);
      }, 3000);
    });
  });
}

// автоматичний запуск при відкритті сторінки
fetchOrders(1).then(result => {
  console.log("Список замовлень:", result);
});
</script>

</body>
</html>
